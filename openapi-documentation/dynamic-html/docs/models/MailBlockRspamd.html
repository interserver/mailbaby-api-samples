
<h2>MailBlockRspamd</h2>
<ul class="parameter">
  <li class="param-required-true">from : String
    <br/>The sender email address.  Pass this value as &#x60;email&#x60; to &#x60;POST /mail/blocks/delete&#x60; to delist the sender.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-true">subject : String
    <br/>The suspicious subject pattern that triggered the block.
  </li>
</ul>
